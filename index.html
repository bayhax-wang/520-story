<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我们的故事</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="starfield"></canvas>

<section class="prologue">
  <p class="prologue-text">有些人，走了很远的路<br>才发现一直在彼此身边</p>
  <div class="prologue-hint"><span>向下滑动，开始我们的故事</span><span class="arrow">↓</span></div>
</section>

<!-- ===== 第一章 ===== -->
<section class="chapter" id="chapter1">
  <h2 class="chapter-title" data-reveal>第一章</h2>
  <p class="chapter-subtitle" data-reveal>平行线</p>

  <div class="scene-full" data-reveal data-scene="primary">
    <canvas id="cv-primary"></canvas>
    <div class="scene-label">小学 · 同校不同班</div>
  </div>

  <div class="scene-full" data-reveal data-scene="middle">
    <canvas id="cv-middle"></canvas>
    <div class="scene-label">初中 · 一条街的距离</div>
  </div>

  <div class="scene-full" data-reveal data-scene="high">
    <canvas id="cv-high"></canvas>
    <div class="scene-label">高中 · 同一趟车</div>
  </div>

  <div class="scene-full converge" data-reveal data-scene="mountain">
    <canvas id="cv-mountain"></canvas>
    <div class="scene-label warm">毕业后 · 那次徒步</div>
  </div>

  <div class="burst-container" data-reveal>
    <canvas id="burst-canvas" width="320" height="160"></canvas>
    <div class="burst-text">从此，不再平行</div>
  </div>

  <div class="chapter-end" data-reveal>
    <p class="next-hint">第二章 · 交汇</p>
  </div>
</section>

<!-- ===== 第二章 ===== -->
<section class="chapter" id="chapter2">
  <h2 class="chapter-title" data-reveal>第二章</h2>
  <p class="chapter-subtitle" data-reveal>交汇</p>

  <div class="scene-full" data-reveal data-scene="summer">
    <canvas id="cv-summer"></canvas>
    <div class="scene-label">那年夏天 · 聊不完的话</div>
  </div>

  <div class="photo-frame" data-reveal>
    <div class="photo-placeholder" id="photo-hike">
      <div class="photo-icon">⛰️</div>
      <div class="photo-hint">那次徒步的合照</div>
      <div class="photo-sub">（等你发给我，我帮你放进来）</div>
    </div>
  </div>

  <div class="scene-full" data-reveal data-scene="parting">
    <canvas id="cv-parting"></canvas>
    <div class="scene-label">九月 · 各奔前程</div>
  </div>

  <div class="scene-full tall" data-reveal data-scene="typing">
    <canvas id="cv-typing"></canvas>
    <div class="scene-label">那些发不出去的消息</div>
  </div>

  <div class="scene-full" data-reveal data-scene="waiting">
    <canvas id="cv-waiting"></canvas>
    <div class="scene-label">等待</div>
  </div>

  <div class="scene-full" data-reveal data-scene="reunion">
    <canvas id="cv-reunion"></canvas>
    <div class="scene-label">一年后 · 他也上大学了</div>
  </div>

  <div class="chapter-end" data-reveal>
    <p class="next-hint">第三章 · 心照不宣 — 即将揭开</p>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
